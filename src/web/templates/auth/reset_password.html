{% extends "base.html" %}
{% block title %}Reset Password — The AI Signal{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="text-center mb-8">
        <iconify-icon icon="lucide:lock" class="text-coral text-3xl mb-3"></iconify-icon>
        <h1 class="font-heading font-bold text-3xl text-forest headline-tracking">Create New Password</h1>
        <p class="text-forest/50 mt-2">Enter a new password for your account.</p>
    </div>
    <div class="corner-marker bg-white rounded-lg p-8">
        {% if error %}
        <div class="bg-coral/10 text-coral-dark p-3 rounded mb-4 text-sm font-medium">{{ error }}</div>
        {% endif %}
        <form method="post" action="/reset-password" class="space-y-5">
            {{ csrf_input(request) | safe }}
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label class="block text-sm font-medium text-forest/70 mb-1.5">New Password</label>
                <input type="password" name="password" required minlength="6"
                    class="w-full border border-forest/20 rounded px-4 py-2.5 bg-cream focus:outline-none focus:border-coral transition text-forest placeholder-forest/30"
                    placeholder="At least 6 characters">
            </div>
            <div>
                <label class="block text-sm font-medium text-forest/70 mb-1.5">Confirm Password</label>
                <input type="password" name="confirm_password" required minlength="6"
                    class="w-full border border-forest/20 rounded px-4 py-2.5 bg-cream focus:outline-none focus:border-coral transition text-forest placeholder-forest/30"
                    placeholder="Re-enter your password">
            </div>
            <button type="submit" class="w-full bg-coral text-white rounded py-2.5 font-heading font-semibold hover:bg-coral-dark transition">
                Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
