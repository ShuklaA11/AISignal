{% extends "base.html" %}
{% block title %}Sign Up — The AI Signal{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="text-center mb-8">
        <iconify-icon icon="lucide:radio" class="text-coral text-3xl mb-3"></iconify-icon>
        <h1 class="font-heading font-bold text-3xl text-forest headline-tracking">Get started</h1>
        <p class="text-forest/50 mt-2">Create your personalized AI intelligence feed.</p>
    </div>
    <div class="corner-marker bg-white rounded-lg p-8">
        {% if error %}
        <div class="bg-coral/10 text-coral-dark p-3 rounded mb-4 text-sm font-medium">{{ error }}</div>
        {% endif %}
        <form method="post" action="/signup" class="space-y-5">
            {{ csrf_input(request) | safe }}
            <div>
                <label class="block text-sm font-medium text-forest/70 mb-1.5">Name</label>
                <input type="text" name="name"
                    class="w-full border border-forest/20 rounded px-4 py-2.5 bg-cream focus:outline-none focus:border-coral transition text-forest placeholder-forest/30"
                    placeholder="Your name (optional)">
            </div>
            <div>
                <label class="block text-sm font-medium text-forest/70 mb-1.5">Email</label>
                <input type="email" name="email" required
                    value="{{ prefill_email or '' }}"
                    class="w-full border border-forest/20 rounded px-4 py-2.5 bg-cream focus:outline-none focus:border-coral transition text-forest placeholder-forest/30"
                    placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-forest/70 mb-1.5">Password</label>
                <input type="password" name="password" required minlength="6"
                    class="w-full border border-forest/20 rounded px-4 py-2.5 bg-cream focus:outline-none focus:border-coral transition text-forest placeholder-forest/30"
                    placeholder="At least 6 characters">
            </div>
            <button type="submit" class="w-full bg-coral text-white rounded py-2.5 font-heading font-semibold hover:bg-coral-dark transition">
                Create Account
            </button>
        </form>
        <p class="text-sm text-forest/40 mt-6 text-center">
            Already have an account? <a href="/login" class="text-coral hover:text-coral-dark font-medium transition">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
